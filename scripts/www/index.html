<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3D Word Flashcard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #4158d0, #9d50bb);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .title {
      color: #fff;
      font-size: 28px;
      text-shadow: 0 2px 6px rgba(0,0,0,0.2);
      text-align: center;
    }

    .card-box {
      width: 100%;
      height: 380px;
      perspective: 1600px;
      cursor: pointer;
    }

    .card {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.9s cubic-bezier(0.25, 0.8, 0.25, 1);
      border-radius: 24px;
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .front, .back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 24px;
      background: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 32px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.15);
    }

    .back {
      transform: rotateY(180deg);
      background: #f7f9fc;
    }

    .word {
      font-size: 36px;
      font-weight: 600;
      color: #222;
      margin-bottom: 12px;
      text-align: center;
    }

    .phonetic {
      font-size: 20px;
      color: #666;
      margin-bottom: 8px;
    }

    .meaning {
      font-size: 24px;
      color: #222;
      text-align: center;
      line-height: 1.4;
    }

    .like-btn {
      position: absolute;
      top: 24px;
      right: 24px;
      background: transparent;
      border: none;
      font-size: 30px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .like-btn:hover {
      transform: scale(1.12);
    }

    .like-btn.active {
      color: #ff5252;
    }

    .btn-group {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 14px 28px;
      border-radius: 50px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      background: #fff;
      color: #7a4cb8;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
      transition: all 0.3s;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 999;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal-body {
      background: #fff;
      width: 100%;
      max-width: 600px;
      border-radius: 20px;
      padding: 28px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-head h2 {
      font-size: 22px;
      color: #222;
    }

    .close {
      font-size: 28px;
      cursor: pointer;
      color: #666;
    }

    .word-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #f1f3f5;
      border-radius: 10px;
    }

    .item-text {
      font-size: 16px;
      line-height: 1.4;
    }

    .remove {
      background: #ff5252;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .empty {
      text-align: center;
      color: #999;
      padding: 30px 0;
    }

    @media (max-width: 600px) {
      .word { font-size: 28px; }
      .meaning { font-size: 20px; }
      .card-box { height: 340px; }
    }
  </style>
</head>

    const card = document.getElementById('card');
    const wordEl = document.getElementById('word');
    const phoneticEl = document.getElementById('phonetic');
    const meaningEl = document.getElementById('meaning');
    const likeBtn = document.getElementById('likeBtn');
    const randomBtn = document.getElementById('randomBtn');
    const vocabBtn = document.getElementById('vocabBtn');
    const modal = document.getElementById('modal');
    const closeModal = document.getElementById('closeModal');
    const wordList = document.getElementById('wordList');

    let current = 0;
    let favorites = JSON.parse(localStorage.getItem('favs')) || [];

    show(current);

    card.addEventListener('click', () => card.classList.toggle('flipped'));

    function show(index) {
      current = index;
      const w = words[index];
      wordEl.textContent = w.word;
      phoneticEl.textContent = w.phonetic;
      meaningEl.textContent = w.meaning;
      card.classList.remove('flipped');
      updateLike();
    }

    function random() {
      let i;
      do { i = Math.floor(Math.random() * words.length); }
      while (i === current);
      show(i);
    }

    randomBtn.addEventListener('click', random);

    likeBtn.addEventListener('click', e => {
      e.stopPropagation();
      const w = words[current];
      const has = favorites.some(x => x.word === w.word);
      if (has) {
        favorites = favorites.filter(x => x.word !== w.word);
      } else {
        favorites.push(w);
      }
      localStorage.setItem('favs', JSON.stringify(favorites));
      updateLike();
    });

    function updateLike() {
      const w = words[current];
      const isFav = favorites.some(x => x.word === w.word);
      likeBtn.textContent = isFav ? '♥' : '♡';
      likeBtn.classList.toggle('active', isFav);
    }

    vocabBtn.addEventListener('click', () => {
      renderList();
      modal.style.display = 'flex';
    });

    closeModal.addEventListener('click', () => modal.style.display = 'none');
    modal.addEventListener('click', e => e.target === modal && (modal.style.display = 'none'));

    function renderList() {
      if (favorites.length === 0) {
        wordList.innerHTML = '<div class="empty">生词本为空</div>';
        return;
      }
      wordList.innerHTML = favorites.map((w, i) => `
        <div class="item">
          <div class="item-text"><strong>${w.word}</strong><br>${w.meaning}</div>
          <button class="remove" onclick="del(${i})">移除</button>
        </div>
      `).join('');
    }

    window.del = function(index) {
      favorites.splice(index, 1);
      localStorage.setItem('favs', JSON.stringify(favorites));
      renderList();
      updateLike();
    };
  </script>
